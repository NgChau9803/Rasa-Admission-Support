<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOICT Chatbot Demo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #002D56 0%, #C2132D 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; line-height: 1.6; }
        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: #C2132D;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">SOICT - HUST</div>
        <h1>Tuyển sinh Chatbot</h1>
        <p>Chào mừng bạn đến với trang demo tích hợp Chatbot của Trường CNTT&TT. <br> Hãy nhìn xuống góc dưới bên phải để trải nghiệm Assistant!</p>
    </div>

    <!-- Rasa Widget Integration Script -->
    <script src="rasa-widget.js"></script>

</body>
</html>
